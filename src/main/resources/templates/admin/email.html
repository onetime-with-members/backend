<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/default}">
<head>
    <title>이메일 발송 - OneTime Admin</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">이메일 발송</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">사용자에게 이메일을 발송합니다</p>
        </div>
    </div>

    <!-- Tabs -->
    <div class="border-b border-gray-200 dark:border-gray-700 mb-6">
        <nav class="flex gap-6">
            <button type="button" class="tab-btn pb-3 text-sm font-medium border-b-2 border-accent-500 text-gray-900 dark:text-white" data-tab="groupSend">
                <i data-lucide="users" class="w-4 h-4 inline mr-1"></i>
                그룹 발송
            </button>
            <button type="button" class="tab-btn pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300" data-tab="individualSend">
                <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>
                개별 발송
            </button>
            <button type="button" class="tab-btn pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300" data-tab="emailLogs">
                <i data-lucide="history" class="w-4 h-4 inline mr-1"></i>
                발송 로그
            </button>
            <button type="button" class="tab-btn pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300" data-tab="emailTemplates">
                <i data-lucide="file-text" class="w-4 h-4 inline mr-1"></i>
                템플릿
            </button>
        </nav>
    </div>

    <!-- Tab Contents -->
    <div id="tabContents">
        <!-- Tab 1: Group Send -->
        <div id="groupSend" class="tab-content">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-5 transition-colors">
                <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <i data-lucide="users" class="w-4 h-4"></i>
                    그룹 발송
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">대상 그룹</label>
                        <select id="groupTargetGroup" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                            <option value="">-- 선택 --</option>
                            <option value="agreed">마케팅 동의</option>
                            <option value="dormant">휴면 유저</option>
                            <option value="noEvent">이벤트 미생성</option>
                            <option value="oneTime">일회성 유저</option>
                            <option value="vip">VIP 유저</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">최대 발송 수</label>
                        <input type="number" id="groupLimit" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" value="100" min="1" max="1000">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">제목</label>
                        <input type="text" id="groupSubject" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" placeholder="이메일 제목...">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">콘텐츠 타입</label>
                        <select id="groupContentType" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                            <option value="TEXT">TEXT</option>
                            <option value="HTML">HTML</option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">템플릿 선택</label>
                    <select id="groupTemplateSelect" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                        <option value="">템플릿을 선택하세요</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">내용</label>
                    <textarea id="groupContent" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" rows="6" placeholder="이메일 내용..."></textarea>
                </div>
                <div class="flex justify-end">
                    <button type="button" class="px-4 py-2 text-sm bg-accent-500 text-white rounded-md hover:bg-accent-600 transition-colors flex items-center gap-2" id="btnGroupSend">
                        <i data-lucide="send" class="w-4 h-4"></i>
                        발송
                    </button>
                </div>
            </div>
        </div>

        <!-- Tab 2: Individual Send -->
        <div id="individualSend" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
                <!-- Left: User Search -->
                <div class="lg:col-span-2">
                    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-5 transition-colors">
                        <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                            <i data-lucide="search" class="w-4 h-4"></i>
                            사용자 검색
                        </h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="userSearchInput" class="flex-1 px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" placeholder="이름 또는 이메일...">
                            <button type="button" id="btnSearchUser" class="px-3 py-2 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-md hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div id="searchLoading" class="hidden flex justify-center py-4">
                            <div class="animate-spin rounded-full h-5 w-5 border-2 border-gray-300 dark:border-gray-600 border-t-accent-500"></div>
                        </div>
                        <div class="overflow-y-auto max-h-64">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="border-b border-gray-200 dark:border-gray-700">
                                        <th class="w-8 py-2"></th>
                                        <th class="text-left py-2 text-gray-500 dark:text-gray-400 font-medium">이름</th>
                                        <th class="text-left py-2 text-gray-500 dark:text-gray-400 font-medium">이메일</th>
                                    </tr>
                                </thead>
                                <tbody id="searchResultBody">
                                    <tr>
                                        <td colspan="3" class="text-center text-gray-400 dark:text-gray-500 py-4">위에서 사용자를 검색하세요</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Right: Email Compose -->
                <div class="lg:col-span-3">
                    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-5 transition-colors">
                        <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                            이메일 작성
                        </h3>
                        <!-- Selected Users -->
                        <div class="mb-4">
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">선택된 사용자</label>
                            <div id="selectedUsersArea" class="border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 min-h-10 flex flex-wrap gap-1">
                                <span class="text-gray-400 dark:text-gray-500 text-sm" id="noSelectedText">선택된 사용자 없음</span>
                            </div>
                            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">선택: <strong id="selectedCount">0</strong>명</p>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">제목</label>
                            <input type="text" id="indSubject" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" placeholder="이메일 제목...">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">콘텐츠 타입</label>
                            <select id="indContentType" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                                <option value="TEXT">TEXT</option>
                                <option value="HTML">HTML</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">템플릿 선택</label>
                            <select id="indTemplateSelect" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                                <option value="">템플릿을 선택하세요</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">내용</label>
                            <textarea id="indContent" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" rows="6" placeholder="이메일 내용..."></textarea>
                        </div>
                        <div class="flex justify-end">
                            <button type="button" class="px-4 py-2 text-sm bg-accent-500 text-white rounded-md hover:bg-accent-600 transition-colors flex items-center gap-2" id="btnIndividualSend">
                                <i data-lucide="send" class="w-4 h-4"></i>
                                발송
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Email Logs -->
        <div id="emailLogs" class="tab-content hidden">
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-4 transition-colors">
                    <p class="text-xs text-gray-500 dark:text-gray-400 uppercase mb-1">총 발송</p>
                    <p class="text-xl font-semibold text-gray-900 dark:text-white" id="statsTotalSent">-</p>
                </div>
                <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-4 transition-colors">
                    <p class="text-xs text-gray-500 dark:text-gray-400 uppercase mb-1">오늘 발송</p>
                    <p class="text-xl font-semibold text-gray-900 dark:text-white" id="statsSentToday">-</p>
                </div>
                <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-4 transition-colors">
                    <p class="text-xs text-gray-500 dark:text-gray-400 uppercase mb-1">오늘 실패</p>
                    <p class="text-xl font-semibold text-gray-900 dark:text-white" id="statsFailedToday">-</p>
                </div>
                <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-4 transition-colors">
                    <p class="text-xs text-gray-500 dark:text-gray-400 uppercase mb-1">성공률</p>
                    <p class="text-xl font-semibold text-gray-900 dark:text-white" id="statsSuccessRate">-</p>
                </div>
            </div>

            <!-- Logs Table -->
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg transition-colors">
                <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
                    <h3 class="text-sm font-medium text-gray-900 dark:text-white flex items-center gap-2">
                        <i data-lucide="history" class="w-4 h-4"></i>
                        발송 로그
                    </h3>
                    <div class="flex items-center gap-2">
                        <select id="logStatusFilter" class="px-3 py-1.5 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                            <option value="">전체</option>
                            <option value="SENT">발송됨</option>
                            <option value="FAILED">실패</option>
                        </select>
                        <div class="flex">
                            <input type="text" id="logSearchInput" class="px-3 py-1.5 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-l-md focus:outline-none focus:ring-2 focus:ring-accent-500" placeholder="수신자 검색...">
                            <button type="button" id="btnSearchLogs" class="px-3 py-1.5 border border-l-0 border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-r-md hover:bg-gray-50 dark:hover:bg-gray-800">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-gray-200 dark:border-gray-700">
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">수신자</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">제목</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">그룹</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">상태</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">발송일시</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">오류</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <tr>
                                <td colspan="6" class="text-center text-gray-400 dark:text-gray-500 py-8">발송 로그가 없습니다</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <nav id="logsPagination" class="hidden flex justify-center py-4 border-t border-gray-200 dark:border-gray-700">
                    <ul class="flex gap-1" id="paginationList"></ul>
                </nav>
            </div>
        </div>

        <!-- Tab 4: Templates -->
        <div id="emailTemplates" class="tab-content hidden">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg transition-colors">
                <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
                    <h3 class="text-sm font-medium text-gray-900 dark:text-white flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                        템플릿
                    </h3>
                    <button type="button" class="px-3 py-1.5 text-sm bg-accent-500 text-white rounded-md hover:bg-accent-600 transition-colors flex items-center gap-2" onclick="showTemplateModal()">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        새 템플릿
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-gray-200 dark:border-gray-700">
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">이름</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">제목</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">타입</th>
                                <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400 font-medium">수정일</th>
                            </tr>
                        </thead>
                        <tbody id="templatesTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-gray-400 dark:text-gray-500 py-8">템플릿이 없습니다</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Template Modal -->
    <div id="templateModal" class="hidden fixed inset-0 bg-black/50 dark:bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 border dark:border-gray-700 rounded-lg w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="templateModalTitle">새 템플릿</h3>
                <button onclick="closeTemplateModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 overflow-auto p-4">
                <input type="hidden" id="templateId">
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">템플릿 이름</label>
                    <input type="text" id="templateName" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" placeholder="템플릿 이름...">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">제목</label>
                    <input type="text" id="templateSubject" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" placeholder="이메일 제목...">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">콘텐츠 타입</label>
                    <select id="templateContentType" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500">
                        <option value="TEXT">TEXT</option>
                        <option value="HTML">HTML</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">내용</label>
                    <textarea id="templateContent" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-md focus:outline-none focus:ring-2 focus:ring-accent-500" rows="10" placeholder="이메일 내용..."></textarea>
                </div>
            </div>
            <div class="flex items-center justify-end gap-2 p-4 border-t border-gray-200 dark:border-gray-700">
                <button type="button" onclick="closeTemplateModal()" class="px-4 py-2 text-sm border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-md hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    취소
                </button>
                <button type="button" onclick="saveTemplate()" class="px-4 py-2 text-sm bg-accent-500 text-white rounded-md hover:bg-accent-600 transition-colors">
                    저장
                </button>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    // ==================== Tab Navigation ====================
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const targetTab = btn.dataset.tab;

            tabBtns.forEach(b => {
                b.classList.remove('border-accent-500', 'text-gray-900', 'dark:text-white');
                b.classList.add('border-transparent', 'text-gray-500', 'dark:text-gray-400');
            });
            btn.classList.remove('border-transparent', 'text-gray-500', 'dark:text-gray-400');
            btn.classList.add('border-accent-500', 'text-gray-900', 'dark:text-white');

            tabContents.forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(targetTab).classList.remove('hidden');

            // Load data when switching tabs
            if (targetTab === 'emailLogs') {
                loadEmailLogs();
                loadEmailStats();
            } else if (targetTab === 'emailTemplates') {
                loadTemplates();
            }
        });
    });

    // ==================== Selected Users State ====================
    const selectedUsers = new Map();

    function updateSelectedUI() {
        const area = document.getElementById('selectedUsersArea');
        const count = selectedUsers.size;
        document.getElementById('selectedCount').textContent = count;

        if (count === 0) {
            area.innerHTML = '<span class="text-gray-400 dark:text-gray-500 text-sm" id="noSelectedText">선택된 사용자 없음</span>';
        } else {
            let chips = '';
            selectedUsers.forEach((user, email) => {
                chips += `<span class="inline-flex items-center px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-full">
                    ${user.name || email}
                    <button class="ml-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" onclick="removeUser('${email}')">&times;</button>
                </span>`;
            });
            area.innerHTML = chips;
        }

        document.querySelectorAll('input.user-checkbox').forEach(cb => {
            cb.checked = selectedUsers.has(cb.dataset.email);
        });
    }

    function addUser(email, name) {
        selectedUsers.set(email, { name: name, email: email });
        updateSelectedUI();
    }

    function removeUser(email) {
        selectedUsers.delete(email);
        updateSelectedUI();
    }

    function toggleUser(email, name) {
        if (selectedUsers.has(email)) {
            removeUser(email);
        } else {
            addUser(email, name);
        }
    }

    // ==================== User Search ====================
    let searchTimeout = null;

    function searchUsers(query) {
        if (!query || query.trim().length < 1) return;

        document.getElementById('searchLoading').classList.remove('hidden');

        fetch(`/api/v1/admin/statistics/users/search?query=${encodeURIComponent(query.trim())}&limit=20`)
            .then(response => response.json())
            .then(data => {
                if (data.is_success && data.payload) {
                    renderSearchResults(data.payload);
                }
            })
            .catch(error => console.error('Error:', error))
            .finally(() => document.getElementById('searchLoading').classList.add('hidden'));
    }

    function renderSearchResults(users) {
        let tbody = '';
        if (!users || users.length === 0) {
            tbody = '<tr><td colspan="3" class="text-center text-gray-400 dark:text-gray-500 py-4">검색 결과 없음</td></tr>';
        } else {
            users.forEach(user => {
                const checked = selectedUsers.has(user.email) ? 'checked' : '';
                tbody += `
                    <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer" onclick="toggleUser('${user.email}', '${user.name || ''}')">
                        <td class="text-center py-2">
                            <input type="checkbox" class="user-checkbox rounded border-gray-300 dark:border-gray-600"
                                   data-email="${user.email}" ${checked}
                                   onclick="event.stopPropagation(); toggleUser('${user.email}', '${user.name || ''}')">
                        </td>
                        <td class="py-2 text-gray-900 dark:text-white">${user.name || '-'}</td>
                        <td class="py-2 text-gray-600 dark:text-gray-400">${user.email || '-'}</td>
                    </tr>
                `;
            });
        }
        document.getElementById('searchResultBody').innerHTML = tbody;
    }

    document.getElementById('userSearchInput').addEventListener('keyup', function(e) {
        clearTimeout(searchTimeout);
        if (e.key === 'Enter') {
            searchUsers(this.value);
        } else {
            searchTimeout = setTimeout(() => searchUsers(this.value), 500);
        }
    });

    document.getElementById('btnSearchUser').addEventListener('click', function() {
        searchUsers(document.getElementById('userSearchInput').value);
    });

    // ==================== Group Send ====================
    document.getElementById('btnGroupSend').addEventListener('click', async function() {
        const targetGroup = document.getElementById('groupTargetGroup').value;
        const subject = document.getElementById('groupSubject').value.trim();
        const content = document.getElementById('groupContent').value.trim();
        const contentType = document.getElementById('groupContentType').value;
        const limit = parseInt(document.getElementById('groupLimit').value) || 100;

        if (!targetGroup) { showAlert('대상 그룹을 선택해주세요', 'warning'); return; }
        if (!subject) { showAlert('제목을 입력해주세요', 'warning'); return; }
        if (!content) { showAlert('내용을 입력해주세요', 'warning'); return; }

        const confirmed = await showConfirm(`"${targetGroup}" 그룹에 이메일을 발송하시겠습니까? (최대 ${limit}명)`, '이메일 발송');
        if (!confirmed) return;

        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="animate-spin inline-block mr-1">⏳</span> 발송 중...';

        fetch('/api/v1/admin/email/send-to-group', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetGroup, subject, content, contentType, limit })
        })
        .then(response => response.json())
        .then(data => {
            if (data.is_success && data.payload) {
                const r = data.payload;
                showAlert(`발송: ${r.sentCount}명, 실패: ${r.failedCount}명`, 'success', '발송 완료');
                loadEmailLogs();
                loadEmailStats();
            } else {
                showAlert(data.message || '이메일 발송 실패', 'error');
            }
        })
        .catch(error => { console.error(error); showAlert('이메일 발송 실패', 'error'); })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> 발송';
            lucide.createIcons();
        });
    });

    // ==================== Individual Send ====================
    document.getElementById('btnIndividualSend').addEventListener('click', async function() {
        if (selectedUsers.size === 0) { showAlert('사용자를 선택해주세요', 'warning'); return; }

        const subject = document.getElementById('indSubject').value.trim();
        const content = document.getElementById('indContent').value.trim();
        const contentType = document.getElementById('indContentType').value;

        if (!subject) { showAlert('제목을 입력해주세요', 'warning'); return; }
        if (!content) { showAlert('내용을 입력해주세요', 'warning'); return; }

        const emails = Array.from(selectedUsers.keys());
        const confirmed = await showConfirm(`${emails.length}명에게 이메일을 발송하시겠습니까?`, '이메일 발송');
        if (!confirmed) return;

        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="animate-spin inline-block mr-1">⏳</span> 발송 중...';

        fetch('/api/v1/admin/email/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: emails, subject, content, contentType })
        })
        .then(response => response.json())
        .then(data => {
            if (data.is_success && data.payload) {
                const r = data.payload;
                showAlert(`발송: ${r.sentCount}명, 실패: ${r.failedCount}명`, 'success', '발송 완료');
                if (r.sentCount > 0) {
                    selectedUsers.clear();
                    updateSelectedUI();
                    loadEmailLogs();
                    loadEmailStats();
                }
            } else {
                showAlert(data.message || '이메일 발송 실패', 'error');
            }
        })
        .catch(error => { console.error(error); showAlert('이메일 발송 실패', 'error'); })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> 발송';
            lucide.createIcons();
        });
    });

    // ==================== Email Templates ====================
    let templatesCache = [];

    function loadTemplates() {
        fetch('/api/v1/admin/email/templates')
            .then(response => response.json())
            .then(data => {
                if (data.is_success && data.payload) {
                    templatesCache = data.payload;
                    renderTemplatesTable(data.payload);
                    updateTemplateDropdowns(data.payload);
                }
            })
            .catch(error => console.error('Error loading templates:', error));
    }

    function renderTemplatesTable(templates) {
        const isDark = document.documentElement.classList.contains('dark');
        let tbody = '';
        if (!templates || templates.length === 0) {
            tbody = '<tr><td colspan="5" class="text-center text-gray-400 dark:text-gray-500 py-8">템플릿이 없습니다</td></tr>';
        } else {
            templates.forEach(t => {
                const updatedAt = new Date(t.updatedAt).toLocaleString('ko-KR');
                tbody += `
                    <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800">
                        <td class="py-3 px-4 text-gray-900 dark:text-white font-medium">${t.name}</td>
                        <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${t.subject.length > 40 ? t.subject.substring(0, 40) + '...' : t.subject}</td>
                        <td class="py-3 px-4"><span class="px-2 py-0.5 text-xs ${t.contentType === 'HTML' ? 'bg-accent-500 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300'} rounded">${t.contentType}</span></td>
                        <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${updatedAt}</td>
                        <td class="py-3 px-4">
                            <button class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 mr-1" onclick="editTemplate(${t.id})">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button class="p-1 text-gray-400 hover:text-red-600 dark:hover:text-red-400" onclick="deleteTemplate(${t.id})">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }
        document.getElementById('templatesTableBody').innerHTML = tbody;
        lucide.createIcons();
    }

    function updateTemplateDropdowns(templates) {
        const options = templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        const html = '<option value="">템플릿을 선택하세요</option>' + options;
        document.getElementById('groupTemplateSelect').innerHTML = html;
        document.getElementById('indTemplateSelect').innerHTML = html;
    }

    // Template dropdown change handlers
    document.getElementById('groupTemplateSelect').addEventListener('change', function() {
        applyTemplate(this.value, 'group');
    });
    document.getElementById('indTemplateSelect').addEventListener('change', function() {
        applyTemplate(this.value, 'ind');
    });

    function applyTemplate(templateId, prefix) {
        if (!templateId) return;
        const template = templatesCache.find(t => t.id == templateId);
        if (template) {
            document.getElementById(`${prefix}Subject`).value = template.subject;
            document.getElementById(`${prefix}Content`).value = template.content;
            document.getElementById(`${prefix}ContentType`).value = template.contentType;
        }
    }

    function showTemplateModal(id = null) {
        document.getElementById('templateId').value = '';
        document.getElementById('templateName').value = '';
        document.getElementById('templateSubject').value = '';
        document.getElementById('templateContent').value = '';
        document.getElementById('templateContentType').value = 'TEXT';
        document.getElementById('templateModalTitle').textContent = '새 템플릿';

        if (id) {
            const template = templatesCache.find(t => t.id == id);
            if (template) {
                document.getElementById('templateId').value = template.id;
                document.getElementById('templateName').value = template.name;
                document.getElementById('templateSubject').value = template.subject;
                document.getElementById('templateContent').value = template.content;
                document.getElementById('templateContentType').value = template.contentType;
                document.getElementById('templateModalTitle').textContent = '템플릿 수정';
            }
        }
        document.getElementById('templateModal').classList.remove('hidden');
        lucide.createIcons();
    }

    function closeTemplateModal() {
        document.getElementById('templateModal').classList.add('hidden');
    }

    function editTemplate(id) {
        showTemplateModal(id);
    }

    function saveTemplate() {
        const id = document.getElementById('templateId').value;
        const data = {
            name: document.getElementById('templateName').value.trim(),
            subject: document.getElementById('templateSubject').value.trim(),
            content: document.getElementById('templateContent').value,
            contentType: document.getElementById('templateContentType').value
        };

        if (!data.name || !data.subject || !data.content) {
            showAlert('모든 필드를 입력해주세요', 'warning');
            return;
        }

        const url = id ? `/api/v1/admin/email/templates/${id}` : '/api/v1/admin/email/templates';
        const method = id ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            if (data.is_success) {
                closeTemplateModal();
                loadTemplates();
                showAlert(id ? '템플릿이 수정되었습니다' : '템플릿이 생성되었습니다', 'success');
            } else {
                showAlert(data.message || '템플릿 저장 실패', 'error');
            }
        })
        .catch(error => { console.error(error); showAlert('템플릿 저장 실패', 'error'); });
    }

    async function deleteTemplate(id) {
        const confirmed = await showConfirm('이 템플릿을 삭제하시겠습니까?', '템플릿 삭제');
        if (!confirmed) return;

        fetch(`/api/v1/admin/email/templates/${id}`, { method: 'DELETE' })
            .then(response => response.json())
            .then(data => {
                if (data.is_success) {
                    loadTemplates();
                    showAlert('템플릿이 삭제되었습니다', 'success');
                } else {
                    showAlert(data.message || '템플릿 삭제 실패', 'error');
                }
            })
            .catch(error => { console.error(error); showAlert('템플릿 삭제 실패', 'error'); });
    }

    // Modal backdrop click
    document.getElementById('templateModal').addEventListener('click', function(e) {
        if (e.target === this) closeTemplateModal();
    });

    // ==================== Email Logs ====================
    let currentPage = 0;
    const pageSize = 20;

    function loadEmailLogs(page = 0) {
        currentPage = page;
        const status = document.getElementById('logStatusFilter').value;
        const search = document.getElementById('logSearchInput').value.trim();

        let url = `/api/v1/admin/email/logs?page=${page}&size=${pageSize}`;
        if (status) url += `&status=${status}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.is_success && data.payload) {
                    renderEmailLogs(data.payload);
                }
            })
            .catch(error => console.error('Error loading logs:', error));
    }

    function renderEmailLogs(data) {
        const logs = data.logs || [];
        let tbody = '';

        if (logs.length === 0) {
            tbody = '<tr><td colspan="6" class="text-center text-gray-400 dark:text-gray-500 py-8">발송 로그가 없습니다</td></tr>';
        } else {
            logs.forEach(log => {
                const statusClass = log.status === 'SENT' ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400' :
                                   log.status === 'FAILED' ? 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400' :
                                   log.status === 'DELIVERED' ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400' :
                                   log.status === 'BOUNCED' ? 'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400' : 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300';
                const sentAt = new Date(log.sentAt).toLocaleString('ko-KR');
                const errorMsg = log.errorMessage ?
                    `<span class="text-red-500 dark:text-red-400 text-xs" title="${log.errorMessage}">${log.errorMessage.substring(0, 30)}...</span>` : '-';

                tbody += `
                    <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800">
                        <td class="py-3 px-4 text-gray-900 dark:text-white">${log.recipient}</td>
                        <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${log.subject.length > 30 ? log.subject.substring(0, 30) + '...' : log.subject}</td>
                        <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${log.targetGroup || '-'}</td>
                        <td class="py-3 px-4"><span class="px-2 py-0.5 text-xs rounded ${statusClass}">${log.status}</span></td>
                        <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${sentAt}</td>
                        <td class="py-3 px-4">${errorMsg}</td>
                    </tr>
                `;
            });
        }

        document.getElementById('logsTableBody').innerHTML = tbody;
        renderPagination(data);
    }

    function renderPagination(data) {
        const pagination = document.getElementById('paginationList');
        pagination.innerHTML = '';

        if (data.totalPages <= 1) {
            document.getElementById('logsPagination').classList.add('hidden');
            return;
        }

        document.getElementById('logsPagination').classList.remove('hidden');

        // Previous
        pagination.innerHTML += `
            <li>
                <button class="px-3 py-1.5 text-sm border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-md ${!data.hasPrevious ? 'text-gray-300 dark:text-gray-600 cursor-not-allowed' : 'hover:bg-gray-50 dark:hover:bg-gray-800'}"
                        onclick="loadEmailLogs(${currentPage - 1})" ${!data.hasPrevious ? 'disabled' : ''}>
                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                </button>
            </li>
        `;

        // Page numbers
        const startPage = Math.max(0, currentPage - 2);
        const endPage = Math.min(data.totalPages - 1, currentPage + 2);

        for (let i = startPage; i <= endPage; i++) {
            pagination.innerHTML += `
                <li>
                    <button class="px-3 py-1.5 text-sm border rounded-md ${i === currentPage ? 'bg-accent-500 text-white border-accent-500' : 'border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'}"
                            onclick="loadEmailLogs(${i})">${i + 1}</button>
                </li>
            `;
        }

        // Next
        pagination.innerHTML += `
            <li>
                <button class="px-3 py-1.5 text-sm border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-md ${!data.hasNext ? 'text-gray-300 dark:text-gray-600 cursor-not-allowed' : 'hover:bg-gray-50 dark:hover:bg-gray-800'}"
                        onclick="loadEmailLogs(${currentPage + 1})" ${!data.hasNext ? 'disabled' : ''}>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
            </li>
        `;

        lucide.createIcons();
    }

    function loadEmailStats() {
        fetch('/api/v1/admin/email/stats')
            .then(response => response.json())
            .then(data => {
                if (data.is_success && data.payload) {
                    const stats = data.payload;
                    document.getElementById('statsTotalSent').textContent = stats.totalSent.toLocaleString();
                    document.getElementById('statsSentToday').textContent = stats.sentToday.toLocaleString();
                    document.getElementById('statsFailedToday').textContent = stats.failedToday.toLocaleString();
                    document.getElementById('statsSuccessRate').textContent = stats.successRate + '%';
                }
            })
            .catch(error => console.error('Error loading stats:', error));
    }

    // Filter and search handlers
    document.getElementById('logStatusFilter').addEventListener('change', function() {
        loadEmailLogs(0);
    });

    document.getElementById('logSearchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') {
            loadEmailLogs(0);
        }
    });

    document.getElementById('btnSearchLogs').addEventListener('click', function() {
        loadEmailLogs(0);
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        loadTemplates();

        // Check for preselected users from localStorage (from retention page)
        const preselectedData = localStorage.getItem('preselectedEmailUsers');
        if (preselectedData) {
            try {
                const users = JSON.parse(preselectedData);
                if (Array.isArray(users) && users.length > 0) {
                    // Add users to selectedUsers
                    users.forEach(user => {
                        if (user.email) {
                            selectedUsers.set(user.email, {
                                name: user.name || user.nickname || '',
                                email: user.email
                            });
                        }
                    });

                    // Update UI
                    updateSelectedUI();

                    // Switch to individual send tab
                    const individualTabBtn = document.querySelector('[data-tab="individualSend"]');
                    if (individualTabBtn) {
                        individualTabBtn.click();
                    }

                    // Show notification
                    showAlert(`${users.length}명의 사용자가 선택되었습니다`, 'info');
                }
            } catch (e) {
                console.error('Error parsing preselected users:', e);
            }

            // Clear localStorage
            localStorage.removeItem('preselectedEmailUsers');
        }
    });

    // Close modals on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeTemplateModal();
        }
    });
</script>
</th:block>
</body>
</html>
