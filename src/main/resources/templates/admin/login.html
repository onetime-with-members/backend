<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 - OneTime Admin</title>
    <link rel="icon" type="image/png" th:href="@{/admin/img/favicon.png}">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: {
                            500: '#677CEE',
                            600: '#5367d6',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.460.0" crossorigin="anonymous"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 min-h-screen flex items-center justify-center transition-colors duration-200">
    <div class="w-full max-w-sm px-4 sm:px-6 py-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-accent-500 rounded-lg mb-4">
                <span class="text-white text-xl font-bold">O</span>
            </div>
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">OneTime Admin</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">관리자 계정으로 로그인하세요</p>
        </div>

        <!-- Tab Toggle -->
        <div class="flex mb-6 bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
            <button id="loginTab" type="button" onclick="switchTab('login')"
                    class="flex-1 py-2 text-sm font-medium rounded-md transition-colors bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm">
                로그인
            </button>
            <button id="registerTab" type="button" onclick="switchTab('register')"
                    class="flex-1 py-2 text-sm font-medium rounded-md transition-colors text-gray-500 dark:text-gray-400">
                회원가입
            </button>
        </div>

        <!-- Error / Success message -->
        <div th:if="${error}" class="mb-4 p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-md">
            <p class="text-sm text-red-600 dark:text-red-400" th:text="${error}">Error</p>
        </div>
        <div id="successMsg" class="mb-4 p-3 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded-md hidden">
            <p class="text-sm text-green-600 dark:text-green-400" id="successText"></p>
        </div>
        <div id="registerError" class="mb-4 p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-md hidden">
            <p class="text-sm text-red-600 dark:text-red-400" id="registerErrorText"></p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="post" th:action="@{/admin/login}" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">이메일</label>
                <input type="email" name="email" id="email" required autofocus
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent"
                       placeholder="admin@example.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">비밀번호</label>
                <input type="password" name="password" id="password" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent"
                       placeholder="••••••••">
            </div>
            <button type="submit"
                    class="w-full py-2 px-4 bg-accent-500 text-white text-sm font-medium rounded-md hover:bg-accent-600 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-500 dark:focus:ring-offset-gray-900">
                로그인
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="space-y-4 hidden" onsubmit="return handleRegister(event)">
            <div>
                <label for="regName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">이름</label>
                <input type="text" id="regName" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent"
                       placeholder="홍길동">
            </div>
            <div>
                <label for="regEmail" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">이메일</label>
                <input type="email" id="regEmail" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent"
                       placeholder="admin@example.com">
            </div>
            <div>
                <label for="regPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">비밀번호</label>
                <input type="password" id="regPassword" required minlength="6"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent"
                       placeholder="6자 이상">
            </div>
            <button type="submit" id="regSubmitBtn"
                    class="w-full py-2 px-4 bg-accent-500 text-white text-sm font-medium rounded-md hover:bg-accent-600 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-500 dark:focus:ring-offset-gray-900">
                회원가입
            </button>
            <p class="text-xs text-center text-gray-400 dark:text-gray-500">가입 후 마스터 관리자의 승인이 필요합니다</p>
        </form>

        <!-- Theme Toggle -->
        <div class="flex justify-center mt-6">
            <button id="themeToggle" type="button"
                    class="p-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md transition-colors"
                    title="테마 변경" aria-label="테마 변경">
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-6">
            Copyright © OneTime Admin 2026
        </p>
    </div>

    <script>
        lucide.createIcons();

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const registerError = document.getElementById('registerError');
            const successMsg = document.getElementById('successMsg');

            registerError.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-colors bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm';
                registerTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-colors text-gray-500 dark:text-gray-400';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-colors bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm';
                loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-colors text-gray-500 dark:text-gray-400';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regSubmitBtn');
            const errorDiv = document.getElementById('registerError');
            const errorText = document.getElementById('registerErrorText');
            const successDiv = document.getElementById('successMsg');
            const successText = document.getElementById('successText');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = '처리 중...';

            try {
                const response = await fetch('/api/v1/admin/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await response.json();

                if (data.is_success) {
                    successText.textContent = '회원가입이 완료되었습니다. 마스터 관리자 승인 후 로그인할 수 있습니다.';
                    successDiv.classList.remove('hidden');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    errorText.textContent = data.message || '회원가입에 실패했습니다.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorText.textContent = '서버와 통신에 실패했습니다.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = '회원가입';
            }
            return false;
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');

            if (isDark) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
