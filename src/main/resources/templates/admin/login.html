<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title th:text="#{admin.login} + ' - ' + #{admin.title}">Login - OneTime Admin</title>
    <!-- SB Admin 2 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-5 col-lg-6 col-md-8">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="p-5">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-2">
                                    <i class="fas fa-clock text-primary"></i>
                                </h1>
                                <h1 class="h4 text-gray-900 mb-4" th:text="#{admin.title}">OneTime Admin</h1>
                            </div>

                            <!-- Language Selector -->
                            <div class="text-center mb-4">
                                <a th:href="@{/admin/login(lang=ko)}" class="btn btn-sm"
                                   th:classappend="${#locale.language == 'ko' ? 'btn-primary' : 'btn-outline-secondary'}">한국어</a>
                                <a th:href="@{/admin/login(lang=en)}" class="btn btn-sm"
                                   th:classappend="${#locale.language == 'en' ? 'btn-primary' : 'btn-outline-secondary'}">English</a>
                            </div>

                            <!-- Error message -->
                            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <span th:text="${error}">Login failed</span>
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>

                            <form class="user" method="post" th:action="@{/admin/login}">
                                <div class="form-group">
                                    <input type="email" name="email" class="form-control form-control-user"
                                           th:placeholder="#{admin.email}" required autofocus>
                                </div>
                                <div class="form-group">
                                    <input type="password" name="password" class="form-control form-control-user"
                                           th:placeholder="#{admin.password}" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-user btn-block" th:text="#{admin.login}">
                                    Login
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="text-center text-white-50">
                    <small th:text="#{admin.copyright}">Copyright © OneTime Admin 2026</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/js/sb-admin-2.min.js"></script>
</body>
</html>
