<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/default}">
<head>
    <title th:text="#{engagement.title} + ' - ' + #{admin.title}">Event Engagement - OneTime Admin</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Page Heading -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800" th:text="#{engagement.title}">Event Engagement</h1>
    </div>

    <!-- Date Filter -->
    <div th:replace="~{admin/fragments/date-filter :: dateFilter}"></div>

    <!-- Summary Cards Row 1 -->
    <div class="row">
        <!-- 이벤트 완료율 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-success shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                                <span th:text="#{engagement.completionRate}">Completion Rate</span>
                                <i class="fas fa-info-circle ml-1 text-gray-400" data-toggle="tooltip"
                                   th:title="#{info.completionRate}"></i>
                            </div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                <span th:text="${data.completionRate + '%'}">0%</span>
                            </div>
                            <small class="text-muted"
                                   th:text="${data.eventsWithResponse + ' / ' + data.totalEvents}">0 / 0</small>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-check-circle fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 참여자 응답률 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-info text-uppercase mb-1">
                                <span th:text="#{engagement.responseRate}">Response Rate</span>
                                <i class="fas fa-info-circle ml-1 text-gray-400" data-toggle="tooltip"
                                   th:title="#{info.responseRate}"></i>
                            </div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                <span th:text="${data.responseRate + '%'}">0%</span>
                            </div>
                            <small class="text-muted"
                                   th:text="${data.membersWithSelection + ' / ' + data.totalMembers}">0 / 0</small>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-reply fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 평균 응답 시간 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                <span th:text="#{engagement.avgResponseTime}">Avg Response Time</span>
                                <i class="fas fa-info-circle ml-1 text-gray-400" data-toggle="tooltip"
                                   th:title="#{info.avgResponseTime}"></i>
                            </div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                <span th:text="${data.avgResponseTimeHours + 'h'}">0h</span>
                            </div>
                            <small class="text-muted"
                                   th:text="#{engagement.median} + ': ' + ${data.medianResponseTimeHours} + 'h'">Median: 0h</small>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-clock fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 이벤트 삭제율 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-danger shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-danger text-uppercase mb-1">
                                <span th:text="#{engagement.deletionRate}">Deletion Rate</span>
                                <i class="fas fa-info-circle ml-1 text-gray-400" data-toggle="tooltip"
                                   th:title="#{info.deletionRate}"></i>
                            </div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                <span th:text="${data.deletionRate + '%'}">0%</span>
                            </div>
                            <small class="text-muted"
                                   th:text="${data.deletedEvents + ' ' + #{engagement.eventsDeleted}}">0 deleted</small>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-trash-alt fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="row">
        <!-- 멤버 수 분포 -->
        <div class="col-xl-6 col-lg-6">
            <div class="card shadow mb-4">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                    <h6 class="m-0 font-weight-bold text-primary" th:text="#{engagement.memberDistribution}">Member Count Distribution</h6>
                </div>
                <div class="card-body">
                    <div class="chart-bar">
                        <canvas id="memberDistributionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 익명 vs 회원 비율 -->
        <div class="col-xl-6 col-lg-6">
            <div class="card shadow mb-4">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                    <h6 class="m-0 font-weight-bold text-primary" th:text="#{engagement.participantType}">Participant Type</h6>
                </div>
                <div class="card-body">
                    <div class="chart-pie pt-4 pb-2">
                        <canvas id="participantTypeChart"></canvas>
                    </div>
                    <div class="mt-4 text-center small">
                        <span class="mr-2">
                            <i class="fas fa-circle text-primary"></i>
                            <span th:text="#{engagement.anonymous}">Anonymous</span>:
                            <span th:text="${data.anonymousParticipants}">0</span>
                            (<span th:text="${data.anonymousRate + '%'}">0%</span>)
                        </span>
                        <span class="mr-2">
                            <i class="fas fa-circle text-success"></i>
                            <span th:text="#{engagement.registered}">Registered</span>:
                            <span th:text="${data.registeredParticipants}">0</span>
                            (<span th:text="${100 - data.anonymousRate + '%'}">0%</span>)
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Member Distribution Table -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary" th:text="#{engagement.memberDistributionDetail}">Member Distribution Detail</h6>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th th:text="#{engagement.memberCount}">Member Count</th>
                            <th th:text="#{engagement.eventCount}">Event Count</th>
                            <th th:text="#{engagement.percentage}">Percentage</th>
                            <th th:text="#{engagement.bar}">Distribution</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="bucket : ${data.memberCountDistribution}">
                            <td th:text="${bucket.label}">0명</td>
                            <td th:text="${#numbers.formatInteger(bucket.eventCount, 0, 'COMMA')}">0</td>
                            <td th:text="${bucket.percentage + '%'}">0%</td>
                            <td>
                                <div class="progress">
                                    <div class="progress-bar bg-info" role="progressbar"
                                         th:style="'width: ' + ${bucket.percentage} + '%'"
                                         th:attr="aria-valuenow=${bucket.percentage}"
                                         aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    /*<![CDATA[*/
    const memberDistribution = /*[[${data.memberCountDistribution}]]*/ [];
    const anonymousCount = /*[[${data.anonymousParticipants}]]*/ 0;
    const registeredCount = /*[[${data.registeredParticipants}]]*/ 0;

    // Member Distribution Bar Chart
    new Chart(document.getElementById('memberDistributionChart'), {
        type: 'bar',
        data: {
            labels: memberDistribution.map(b => b.label),
            datasets: [{
                label: '이벤트 수',
                data: memberDistribution.map(b => b.eventCount),
                backgroundColor: '#4e73df',
                borderColor: '#4e73df',
                borderWidth: 1
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });

    // Participant Type Pie Chart
    new Chart(document.getElementById('participantTypeChart'), {
        type: 'doughnut',
        data: {
            labels: ['익명 참여자', '회원 참여자'],
            datasets: [{
                data: [anonymousCount, registeredCount],
                backgroundColor: ['#4e73df', '#1cc88a'],
                hoverBackgroundColor: ['#2e59d9', '#17a673'],
                hoverBorderColor: "rgba(234, 236, 244, 1)",
            }]
        },
        options: {
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
                legend: { display: false }
            }
        }
    });
    /*]]>*/
</script>
</th:block>
</body>
</html>
