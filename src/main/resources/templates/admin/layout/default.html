<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:replace="~{admin/fragments/header :: head}"></head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased transition-colors duration-200">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Topbar -->
            <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

            <!-- Page Content -->
            <main class="flex-1 p-6 bg-gray-50 dark:bg-gray-800 transition-colors duration-200">
                <div layout:fragment="content"></div>
            </main>

            <!-- Footer -->
            <div th:replace="~{admin/fragments/footer :: footer}"></div>
        </div>
    </div>

    <!-- Command Palette -->
    <div th:replace="~{admin/fragments/command-palette :: commandPalette}"></div>

    <!-- Initialize Lucide Icons -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>

    <!-- Topbar Script -->
    <script th:replace="~{admin/fragments/topbar :: topbar-script}"></script>

    <!-- Command Palette Script -->
    <script th:replace="~{admin/fragments/command-palette :: commandPaletteScript}"></script>

    <!-- Page specific scripts -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
