<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<header th:fragment="topbar" class="h-14 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 transition-colors duration-200">
    <!-- Page Title -->
    <h1 class="text-lg font-semibold text-gray-900 dark:text-white" th:text="${pageTitle ?: '대시보드'}">Dashboard</h1>

    <!-- Right Side -->
    <div class="flex items-center gap-4">
        <!-- Date Display -->
        <span class="text-sm text-gray-500 dark:text-gray-400" th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
            2026-01-26
        </span>

        <!-- Divider -->
        <div class="h-5 w-px bg-gray-200 dark:bg-gray-700"></div>

        <!-- Dark Mode Toggle -->
        <button id="themeToggle" type="button"
                class="p-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md transition-colors"
                title="테마 변경">
            <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
            <i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
        </button>

        <!-- Divider -->
        <div class="h-5 w-px bg-gray-200 dark:bg-gray-700"></div>

        <!-- User Menu -->
        <div class="relative" id="userMenu">
            <button class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors"
                    onclick="toggleUserMenu()">
                <span th:text="${adminName ?: 'Admin'}">Admin</span>
                <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </button>

            <!-- Dropdown -->
            <div id="userDropdown"
                 class="hidden absolute right-0 top-full mt-2 w-40 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md shadow-lg py-1 z-50">
                <a th:href="@{/admin/logout}"
                   class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>로그아웃</span>
                </a>
            </div>
        </div>
    </div>
</header>

<script th:fragment="topbar-script">
    function toggleUserMenu() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('hidden');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('userMenu');
        const dropdown = document.getElementById('userDropdown');
        if (menu && !menu.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });

    // Dark Mode Toggle
    document.getElementById('themeToggle').addEventListener('click', function() {
        const html = document.documentElement;
        const isDark = html.classList.contains('dark');

        if (isDark) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }

        // Re-render Lucide icons
        lucide.createIcons();

        // Dispatch custom event for charts to update
        window.dispatchEvent(new CustomEvent('themeChanged', { detail: { isDark: !isDark } }));
    });
</script>
</html>
