<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="footer">
    <!-- Footer -->
    <footer class="sticky-footer bg-white">
        <div class="container my-auto">
            <div class="copyright text-center my-auto">
                <span th:text="#{admin.copyright}">Copyright © OneTime Admin 2026</span>
            </div>
        </div>
    </footer>
</div>

<th:block th:fragment="scripts">
    <!-- Bootstrap core JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core plugin JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/jquery.easing@1.4.1/jquery.easing.min.js"></script>
    <!-- Custom scripts for SB Admin 2 -->
    <script src="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/js/sb-admin-2.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Dark Mode Script -->
    <script>
        (function() {
            const darkMode = localStorage.getItem('adminDarkMode') === 'true';
            if (darkMode) {
                document.body.classList.add('dark-mode');
            }
        })();

        $(document).ready(function() {
            // Dark Mode
            function updateDarkModeIcon() {
                const isDark = document.body.classList.contains('dark-mode');
                $('#darkModeIcon').removeClass('fa-moon fa-sun').addClass(isDark ? 'fa-sun' : 'fa-moon');
            }

            updateDarkModeIcon();

            $('#darkModeToggle').on('click', function(e) {
                e.preventDefault();
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('adminDarkMode', isDark);
                updateDarkModeIcon();
            });

            // Auto Refresh
            let refreshTimer = null;
            const intervalLabels = {0: 'OFF', 30000: '30s', 60000: '1m', 300000: '5m'};

            function updateRefreshUI(interval) {
                $('#refreshLabel').text(intervalLabels[interval] || 'OFF');
                $('.refresh-option').removeClass('active');
                $(`.refresh-option[data-interval="${interval}"]`).addClass('active');

                if (interval > 0) {
                    $('#refreshIcon').addClass('fa-spin');
                } else {
                    $('#refreshIcon').removeClass('fa-spin');
                }
            }

            function setAutoRefresh(interval) {
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }

                localStorage.setItem('adminAutoRefresh', interval);
                updateRefreshUI(interval);

                if (interval > 0) {
                    refreshTimer = setInterval(function() {
                        location.reload();
                    }, interval);
                }
            }

            // Initialize from localStorage
            const savedInterval = parseInt(localStorage.getItem('adminAutoRefresh')) || 0;
            setAutoRefresh(savedInterval);

            // Handle click
            $('.refresh-option').on('click', function(e) {
                e.preventDefault();
                const interval = parseInt($(this).data('interval'));
                setAutoRefresh(interval);
            });
        });
    </script>
</th:block>
</html>
