<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="dateFilter" class="card shadow mb-4">
    <div class="card-body py-2">
        <form method="get" class="form-inline justify-content-end">
            <div class="form-group mr-2">
                <label class="mr-2 small font-weight-bold" th:text="#{filter.startDate}">Start Date</label>
                <input type="date" name="startDate" class="form-control form-control-sm"
                       th:value="${startDate}">
            </div>
            <div class="form-group mr-2">
                <label class="mr-2 small font-weight-bold" th:text="#{filter.endDate}">End Date</label>
                <input type="date" name="endDate" class="form-control form-control-sm"
                       th:value="${endDate}">
            </div>
            <button type="submit" class="btn btn-primary btn-sm mr-2" th:text="#{filter.apply}">Apply</button>
            <a th:href="@{${currentUri}}" class="btn btn-secondary btn-sm" th:text="#{filter.reset}">Reset</a>
        </form>
    </div>
</div>
</html>
