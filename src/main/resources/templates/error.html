<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Error - OneTime</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f8f9fa;
        }
        .error-container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 72px;
            color: #dee2e6;
            margin: 0;
        }
        p {
            color: #6c757d;
            margin: 20px 0;
        }
        a {
            color: #4e73df;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>Page not found</p>
        <a href="/">Go to Home</a>
    </div>
</body>
</html>
