# Info Tooltips - Dashboard
info.totalUsers=Total users who signed up in the selected period
info.totalEvents=Total events created in the selected period
info.mau=Users who logged in at least once this month
info.dormantRate=Percentage of users who haven't logged in for 60+ days
info.avgParticipants=Average number of participants per event
info.marketingTargets=Users who agreed to receive marketing notifications

# Info Tooltips - User Statistics
info.activeUsers=Users who logged in within the last 30 days
info.marketingAgreement=Percentage of users with marketing consent
info.providerDistribution=User count by social login (Google, Kakao, Naver)
info.languageDistribution=User distribution by app language setting

# Info Tooltips - Event Statistics
info.activeEvents=Number of currently active events
info.categoryDistribution=Distribution by event type (Date/Schedule)
info.weekdayDistribution=Event creation by day of week (Mon-Sun)
info.topKeywords=Frequently used words in event titles (meeting, study, MT, etc.)
info.timeWeekdayHeatmap=Shows when events are most frequently created by hour and day of week

# Info Tooltips - Retention
info.dormant30=Users inactive for 30-59 days
info.dormant60=Users inactive for 60+ days
info.dormant90=Users inactive for 90+ days (churn risk)
info.returningRate=Users who created 2+ events (repeat users)
info.monthlyMau=Monthly login user trend
info.cohort=Analyze how users from each signup month continue using the service over time
info.funnel=Tracks user journey from signup to repeat usage
info.ttv=Shows time distribution from signup to first event creation
info.stickiness=Measures service stickiness as WAU/MAU ratio. Higher means users visit more frequently

# Info Tooltips - Marketing
info.agreedUsers=Users who opted in for marketing notifications
info.dormantUsers=Marketing agreed but inactive 30+ days (re-engagement target)
info.noEventUsers=Signed up 7+ days ago but never created an event (activation target)
info.oneTimeUsers=Users who created exactly 1 event (re-engagement target)
info.vipUsers=Power users who created 5+ events
info.zeroParticipant=Events created 3+ days ago with no participants yet
