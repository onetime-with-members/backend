server:
  port: ${SERVER_PORT}
  forward-headers-strategy: native
  error:
    whitelabel:
      enabled: false

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PW}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false
    defer-datasource-initialization: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI}
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID}
            client-secret: ${OAUTH_KAKAO_CLIENT_SECRET}
            scope:
              - profile_nickname
              - account_email
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI}
            client-name: Kakao
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  cloud:
    aws:
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${S3_BUCKET_NAME}
      sqs:
        queue-url: ${AWS_SQS_EMAIL_QUEUE_URL}

jwt:
  secret: ${JWT_SECRET}
  redirect:
    access: ${ACCESS_TOKEN_REDIRECT_URI}
    register: ${REGISTER_TOKEN_REDIRECT_URI}
  access-token:
    expiration-time: ${ACCESS_TOKEN_EXPIRATION_TIME}
  admin-user-access-token:
    expiration-time: ${ADMIN_USER_ACCESS_TOKEN_EXPIRATION_TIME}
  refresh-token:
    expiration-time: ${REFRESH_TOKEN_EXPIRATION_TIME}
  register-token:
    expiration-time: ${REGISTER_TOKEN_EXPIRATION_TIME}
  browser-id-salt: ${BROWSER_ID_SALT}

scheduling:
  cron: ${CRON}

refresh-token:
  cleanup:
    update-expired-cron: ${REFRESH_TOKEN_UPDATE_EXPIRED_CRON:0 0 3 * * *}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    persist-authorization: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

qr:
  event-base-url: ${QR_EVENT_BASE_URL}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
  metrics:
    enable:
      process.cpu: false
      system.cpu: false

test:
  auth:
    enabled: false
    secret-key: ${TEST_AUTH_SECRET_KEY}
    user-id: ${TEST_AUTH_USER_ID}

app:
  sync:
    target-url: ${APP_SYNC_TARGET_URL:}
    api-key: ${APP_SYNC_API_KEY:}
  kakao:
    calendar-redirect-uri: ${OAUTH_KAKAO_CALENDAR_REDIRECT_URI:http://localhost:3000/kakao/callback}
